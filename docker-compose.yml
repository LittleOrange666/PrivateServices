services:
  nginx:
    image: nginx:latest
    environment:
      - TZ=Asia/Taipei
    ports:
      - "8088:80"
    volumes:
      - ./data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/etc/nginx/html:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
  backend:
    image: littleorange666/private_services:0.0.2
    environment:
      - TZ=Asia/Taipei
      - DOCKER_HOST=unix:///app/docker.sock
      - ROOT_PASSWORD=${ROOT_PASSWORD}
    volumes:
      - ./data/nginx:/app/nginx:rw
      - ./data/backend:/app/data:rw
      - /var/run/docker.sock:/app/docker.sock:rw
    restart: on-failure
    ports:
      - "8089:8000"